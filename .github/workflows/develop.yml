name: CI/CD — develop

on:
  push:
    branches:
      - develop

jobs:
  test:
    name: Install, Test & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: geography_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:cov

      - name: Enforce coverage >= 60%
        run: |
          COVERAGE=$(npx jest --coverage --coverageReporters=json-summary 2>/dev/null | grep -oP '"pct":\K[0-9.]+' | head -1)
          echo "Coverage: $COVERAGE%"
          node -e "if (parseFloat('$COVERAGE') < 60) { console.error('Coverage below 60%'); process.exit(1); }"

  deploy:
    name: Deploy to Railway (Develop)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to develop
        run: railway up --service 9d0c6e75-88eb-4767-a387-f88b65330486 --environment cd0f8864-4990-47cf-abc8-4ce95ea13487 --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_DEV }}
