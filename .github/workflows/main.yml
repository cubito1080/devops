name: CI/CD — main

on:
  push:
    branches:
      - master

jobs:
  test:
    name: Install, Test & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: prod
          POSTGRES_PASSWORD: prod
          POSTGRES_DB: geography_prod
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:cov

      - name: Enforce coverage >= 100%
        run: |
          COVERAGE=$(npx jest --coverage --coverageReporters=json-summary 2>/dev/null | grep -oP '"pct":\K[0-9.]+' | head -1)
          echo "Coverage: $COVERAGE%"
          node -e "if (parseFloat('$COVERAGE') < 100) { console.error('Coverage below 100%'); process.exit(1); }"

  deploy:
    name: Deploy to Railway (Production)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to production
        run: railway up --service 9d0c6e75-88eb-4767-a387-f88b65330486 --environment 598151cc-2f83-4281-ae5c-60338217da80 --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
