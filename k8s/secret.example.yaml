# Secret template — DO NOT commit real values.
#
# Before deploying to GKE, create this secret manually in the cluster.
# Run this command from your local machine (with kubectl already pointed
# at the GKE cluster — see README for how to get credentials):
#
#   kubectl create secret generic geography-api-secret \
#     --namespace=geography-api \
#     --from-literal=DATABASE_URL='postgresql://user:password@host:5432/dbname'
#
# For Cloud SQL (GCP managed PostgreSQL) the connection string looks like:
#   postgresql://USER:PASSWORD@/DATABASE?host=/cloudsql/PROJECT:REGION:INSTANCE
# when using the Cloud SQL Auth Proxy, or the public IP if direct access is enabled.
#
# To verify the secret was created:
#   kubectl get secret geography-api-secret -n geography-api
#
# If you prefer to apply this YAML file instead, base64-encode your connection
# string first and paste it below:
#   echo -n 'YOUR_DATABASE_URL' | base64

apiVersion: v1
kind: Secret
metadata:
  name: geography-api-secret
  namespace: geography-api
type: Opaque
data:
  # Base64-encoded value of your DATABASE_URL connection string
  DATABASE_URL: <BASE64_ENCODED_DATABASE_URL>
